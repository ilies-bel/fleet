FROM ubuntu:24.04

ARG DEBIAN_FRONTEND=noninteractive

# ── System packages ────────────────────────────────────────────────────────────
RUN apt-get update && apt-get install -y --no-install-recommends \
    ca-certificates curl gnupg git \
    openjdk-21-jdk \
    postgresql-16 \
    nginx \
    supervisor \
 && rm -rf /var/lib/apt/lists/*

# ── Node (NodeSource — Ubuntu 24.04 ships Node 18) ───────────────────────────
RUN curl -fsSL https://deb.nodesource.com/setup_20.x | bash - \
 && apt-get install -y nodejs \
 && rm -rf /var/lib/apt/lists/*

# ── OpenShift-compatible non-root home dir ────────────────────────────────────
# No fixed-UID useradd: OpenShift injects an arbitrary UID at runtime.
# /home/developer exists so entrypoint jar-copy paths keep working under any UID.
RUN mkdir -p /home/developer \
 && chgrp 0 /home/developer \
 && chmod g+rwX /home/developer

# ── Maven 3.9.6 ───────────────────────────────────────────────────────────────
ARG MAVEN_VERSION=3.9.6
RUN curl -fsSL "https://archive.apache.org/dist/maven/maven-3/${MAVEN_VERSION}/binaries/apache-maven-${MAVEN_VERSION}-bin.tar.gz" \
    | tar -xz -C /opt \
 && ln -s /opt/apache-maven-${MAVEN_VERSION}/bin/mvn /usr/local/bin/mvn

# ── Directory structure ───────────────────────────────────────────────────────
# Ubuntu's postgresql-16 apt package runs pg_createcluster in its post-install
# scripts, leaving a partial cluster at the default path. Drop it so the
# entrypoint's own initdb runs from scratch (config ends up in the data dir,
# where `postgres -D` expects to find it).
# GID 0 + g+rwX lets any non-root UID write without a fixed-uid chown.
RUN pg_dropcluster --stop 16 main 2>/dev/null || true \
 && rm -rf /var/lib/postgresql/16/main \
 && mkdir -p /build /app /var/www/html /var/log/supervisor \
            /var/log/nginx /var/lib/nginx/tmp \
 && mkdir -p /var/lib/postgresql/16/main \
 && chgrp -R 0 /var/lib/postgresql \
 && chmod -R g+rwX /var/lib/postgresql \
 && chgrp -R 0 /build /app /var/www/html /var/log/supervisor \
               /var/log/nginx /var/lib/nginx \
 && chmod -R g+rwX /build /app /var/www/html /var/log/supervisor \
                   /var/log/nginx /var/lib/nginx \
 && chgrp -R 0 /etc/supervisor/conf.d /etc/nginx/conf.d \
               /etc/nginx/sites-enabled /etc/nginx/sites-available \
 && chmod -R g+rwX /etc/supervisor/conf.d /etc/nginx/conf.d \
                   /etc/nginx/sites-enabled /etc/nginx/sites-available

# ── nginx: relocate pid to GID-0-writable path, drop root-only user directive ─
RUN sed -i \
        -e 's/^user www-data;/#user www-data;/' \
        -e 's|pid /run/nginx.pid;|pid /var/lib/nginx/tmp/nginx.pid;|' \
        /etc/nginx/nginx.conf

# ── Config files ──────────────────────────────────────────────────────────────
COPY config/nginx.conf           /etc/nginx/sites-available/qa
COPY config/supervisord.conf     /etc/supervisor/conf.d/qa.conf
COPY config/wait-for-pg.sh       /usr/local/bin/wait-for-pg.sh
COPY config/entrypoint.sh        /entrypoint.sh
COPY config/entrypoint-spring.sh /entrypoint-spring.sh

RUN rm -f /etc/nginx/sites-enabled/default \
 && ln -s /etc/nginx/sites-available/qa /etc/nginx/sites-enabled/qa \
 && chmod +x /usr/local/bin/wait-for-pg.sh /entrypoint.sh /entrypoint-spring.sh

# ── Numeric non-root UID with primary group 0 (OpenShift restricted-SCC) ──────
USER 1001:0

# Per-service container model: each service container runs only its own build
# + run commands. The legacy /entrypoint.sh remains for back-compat with the
# monolithic single-container model.
EXPOSE 8081
ENTRYPOINT ["/entrypoint-spring.sh"]
