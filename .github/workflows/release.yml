name: Release

# Publishes @ilies-bel/fleet to npm when a version tag is pushed.
#
# Release flow:
#   1. Bump "version" in package.json (e.g. 1.0.1)
#   2. Commit, then tag: git tag v1.0.1
#   3. Push the tag:      git push origin v1.0.1
#   The tag's version must match package.json, and must not already exist on npm.
#
# Requires repo secret NPM_TOKEN: an npm "Automation" access token with
# publish rights to @ilies-bel/fleet (Settings -> Secrets and variables -> Actions).

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "Tag version:     $TAG"
          echo "package.json:    $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG. Bump package.json and re-tag."
            exit 1
          fi

      - name: Verify version is not already published
        run: |
          PKG_NAME="$(node -p "require('./package.json').name")"
          PKG_VER="$(node -p "require('./package.json').version")"
          PUBLISHED="$(npm view "${PKG_NAME}@${PKG_VER}" version 2>/dev/null || true)"
          if [ -n "$PUBLISHED" ]; then
            echo "::error::${PKG_NAME}@${PKG_VER} is already published to npm. Bump the version."
            exit 1
          fi
          echo "${PKG_NAME}@${PKG_VER} is not yet published — proceeding."

      - name: Pack dry-run (preview tarball contents)
        run: npm publish --dry-run

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
